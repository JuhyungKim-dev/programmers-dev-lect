<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>대시보드</title>
    <style>
        body.light {
            background: white;
            color: #222;
        }
        body.dark {
            background: #222;
            color: #eee;
        }
        a {
            color: #3b82f6;
        }
    </style>
</head>
<body th:classappend="${theme}">
<h1 th:text="|환영합니다, ${username} 님!|">
    환영합니다
</h1>
<p th:if="${lastVisit != null}"
   th:text="|마지막 방문: ${lastVisit}|">
</p>
<p th:if="${lastVisit == null}">
    첫 방문을 환영합니다!
</p>
<p>
    현재 테마 :
    <b th:text="${theme}">light</b>
</p>
<a th:href="@{/task0702/theme(mode='light')}">
    밝게
</a>
|
<a th:href="@{/task0702/theme(mode='dark')}">
    어둡게
</a>
<hr>
<a th:href="@{/task0702/logout}">
    로그아웃
</a>
</body>
</html>
